<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">flash-promoter animated pipeline banner</title>
  <desc id="desc">Animated neon banner showing multi-platform content publishing pipeline: Input → CanonicalPost → WeChat / Zhihu / Bilibili / Xiaohongshu → Publish.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050B0F"/>
      <stop offset="0.45" stop-color="#071518"/>
      <stop offset="1" stop-color="#0A0D10"/>
    </linearGradient>

    <linearGradient id="tealSweep" x1="-120" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E7C66" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#10B981" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#0E7C66" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;1260 0;-260 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="goldPulse" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5C542"/>
      <stop offset="1" stop-color="#E67E22"/>
    </linearGradient>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#113A32" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.49  0 0 0 0 0.40  0 0 0 0.65 0" result="tealBlur"/>
      <feMerge>
        <feMergeNode in="tealBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="28" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1197" height="397" rx="26.5" stroke="#134E3F" stroke-width="3"/>
  <rect x="1.5" y="1.5" width="1197" height="397" rx="26.5" stroke="url(#tealSweep)" stroke-width="3"/>

  <!-- horizontal guide lines -->
  <g opacity="0.42">
    <path d="M0 108H1200" stroke="#10B981" stroke-opacity="0.14"/>
    <path d="M0 284H1200" stroke="#10B981" stroke-opacity="0.10"/>
    <rect y="-60" width="1200" height="60" fill="#10B981" opacity="0.10">
      <animate attributeName="y" values="-60;400;-60" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- title area -->
  <g transform="translate(58 48)">
    <text x="0" y="0" fill="#10B981" font-family="Cascadia Mono, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="4">LOCAL MULTI-PLATFORM PUBLISHING</text>
    <text x="0" y="50" fill="#F0F4F0" font-family="Bahnschrift, Segoe UI, sans-serif" font-size="58" font-weight="800">flash-promoter</text>
    <text x="2" y="88" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="18">
      Markdown → CanonicalPost → WeChat · Zhihu · Bilibili · Xiaohongshu → Publish
    </text>
  </g>

  <!-- pipeline row -->
  <g transform="translate(58 170)">
    <!-- connecting line -->
    <path d="M0 46H964" stroke="#1A4D3E" stroke-width="4" stroke-linecap="round"/>

    <!-- animated dot on line -->
    <circle r="7" fill="#10B981" filter="url(#glow)">
      <animateMotion dur="4.2s" repeatCount="indefinite" path="M0 46H964"/>
      <animate attributeName="opacity" values="0.2;1;1;0.2" dur="4.2s" repeatCount="indefinite"/>
    </circle>

    <!-- step 1: INPUT -->
    <g transform="translate(0 0)" filter="url(#softShadow)">
      <rect width="112" height="92" rx="14" fill="#091118" stroke="#10B981" stroke-opacity="0.50"/>
      <text x="16" y="28" fill="#10B981" font-family="Cascadia Mono, Consolas, monospace" font-size="12" font-weight="700">INPUT</text>
      <text x="16" y="56" fill="#F0F4F0" font-family="Cascadia Mono, Consolas, monospace" font-size="16">Markdown</text>
      <text x="16" y="78" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="14">富文本 / 图片</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="2.6s" repeatCount="indefinite"/>
    </g>

    <!-- step 2: CANONICAL -->
    <g transform="translate(160 0)" filter="url(#softShadow)">
      <rect width="150" height="92" rx="14" fill="#091118" stroke="#1D4C3D"/>
      <text x="16" y="28" fill="#10B981" font-family="Cascadia Mono, Consolas, monospace" font-size="12" font-weight="700">CANONICAL</text>
      <text x="16" y="56" fill="#F0F4F0" font-family="Cascadia Mono, Consolas, monospace" font-size="16">统一内容模型</text>
      <text x="16" y="78" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="14">7 种 Block 类型</text>
      <animateTransform attributeName="transform" type="translate" values="160 0;160 -4;160 0" dur="2.6s" begin="0.3s" repeatCount="indefinite"/>
    </g>

    <!-- step 3: ADAPT -->
    <g transform="translate(358 0)" filter="url(#softShadow)">
      <rect width="130" height="92" rx="14" fill="#091118" stroke="#1D4C3D"/>
      <text x="16" y="28" fill="#10B981" font-family="Cascadia Mono, Consolas, monospace" font-size="12" font-weight="700">ADAPT</text>
      <text x="16" y="56" fill="#F0F4F0" font-family="Cascadia Mono, Consolas, monospace" font-size="16">4 平台适配</text>
      <text x="16" y="78" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="14">插件化生成</text>
      <animateTransform attributeName="transform" type="translate" values="358 0;358 -4;358 0" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
    </g>

    <!-- step 4: PREVIEW -->
    <g transform="translate(536 0)" filter="url(#softShadow)">
      <rect width="140" height="92" rx="14" fill="#091118" stroke="#F5C542" stroke-opacity="0.50"/>
      <text x="16" y="28" fill="#F5C542" font-family="Cascadia Mono, Consolas, monospace" font-size="12" font-weight="700">PREVIEW</text>
      <text x="16" y="56" fill="#F0F4F0" font-family="Cascadia Mono, Consolas, monospace" font-size="16">编辑 / 确认</text>
      <text x="16" y="78" fill="#D4B86A" font-family="Cascadia Mono, Consolas, monospace" font-size="14">分平台预览</text>
      <animateTransform attributeName="transform" type="translate" values="536 0;536 -4;536 0" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
    </g>

    <!-- step 5: PUBLISH -->
    <g transform="translate(724 0)" filter="url(#softShadow)">
      <rect width="240" height="92" rx="14" fill="#091118" stroke="#10B981" stroke-opacity="0.55"/>
      <text x="16" y="28" fill="#10B981" font-family="Cascadia Mono, Consolas, monospace" font-size="12" font-weight="700">PUBLISH</text>
      <text x="16" y="56" fill="#F0F4F0" font-family="Cascadia Mono, Consolas, monospace" font-size="16">simulate · draft · assist</text>
      <text x="16" y="78" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="14">校验 → 发布 → 日志记录</text>
      <animateTransform attributeName="transform" type="translate" values="724 0;724 -4;724 0" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- platform cards row -->
  <g transform="translate(58 304)">
    <!-- WeChat -->
    <g transform="translate(0 0)" filter="url(#softShadow)">
      <rect width="246" height="70" rx="14" fill="#0A1419" stroke="#1D4C3D"/>
      <circle cx="36" cy="36" r="14" fill="#07C160" opacity="0.82"/>
      <text x="17" y="42" fill="#F0F4F0" font-family="sans-serif" font-size="16">🟢</text>
      <text x="62" y="32" fill="#F0F4F0" font-family="sans-serif" font-size="17" font-weight="700">微信公众号</text>
      <text x="62" y="54" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="13">draft · 长文 + 封面提示</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.2s" repeatCount="indefinite"/>
    </g>

    <!-- Zhihu -->
    <g transform="translate(270 0)" filter="url(#softShadow)">
      <rect width="220" height="70" rx="14" fill="#0A1419" stroke="#1D4C3D"/>
      <text x="16" y="42" fill="#F0F4F0" font-family="sans-serif" font-size="16">🔵</text>
      <text x="48" y="32" fill="#F0F4F0" font-family="sans-serif" font-size="17" font-weight="700">知乎</text>
      <text x="48" y="54" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="13">assist · 问答 + 话题标签</text>
      <animateTransform attributeName="transform" type="translate" values="270 0;270 -3;270 0" dur="2.2s" begin="0.25s" repeatCount="indefinite"/>
    </g>

    <!-- Bilibili -->
    <g transform="translate(514 0)" filter="url(#softShadow)">
      <rect width="220" height="70" rx="14" fill="#0A1419" stroke="#1D4C3D"/>
      <text x="16" y="42" fill="#F0F4F0" font-family="sans-serif" font-size="16">🩷</text>
      <text x="48" y="32" fill="#F0F4F0" font-family="sans-serif" font-size="17" font-weight="700">B站</text>
      <text x="48" y="54" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="13">simulate · 分区 + 置顶评论</text>
      <animateTransform attributeName="transform" type="translate" values="514 0;514 -3;514 0" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
    </g>

    <!-- Xiaohongshu -->
    <g transform="translate(758 0)" filter="url(#softShadow)">
      <rect width="246" height="70" rx="14" fill="#0A1419" stroke="#1D4C3D"/>
      <text x="16" y="42" fill="#F0F4F0" font-family="sans-serif" font-size="16">🔴</text>
      <text x="48" y="32" fill="#F0F4F0" font-family="sans-serif" font-size="17" font-weight="700">小红书</text>
      <text x="48" y="54" fill="#7A9A8A" font-family="Cascadia Mono, Consolas, monospace" font-size="13">assist · 笔记 + 卡片文案</text>
      <animateTransform attributeName="transform" type="translate" values="758 0;758 -3;758 0" dur="2.2s" begin="0.75s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- floating particles -->
  <g fill="#10B981" filter="url(#glow)">
    <path d="M96 88l5 10 10 5-10 5-5 10-5-10-10-5 10-5 5-10z">
      <animate attributeName="opacity" values="0.18;0.95;0.18" dur="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0.88;1.1;0.88" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M780 90l4 8 8 4-8 4-4 8-4-8-8-4 8-4 4-8z">
      <animate attributeName="opacity" values="0.12;0.85;0.12" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <path d="M1120 80l5 10 10 5-10 5-5 10-5-10-10-5 10-5 5-10z">
      <animate attributeName="opacity" values="0.16;1;0.16" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- pulsing dots near publish area -->
  <g opacity="0.68">
    <circle cx="860" cy="310" r="4" fill="#10B981">
      <animate attributeName="r" values="3;7;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="890" cy="310" r="4" fill="#F5C542">
      <animate attributeName="r" values="3;7;3" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="310" r="4" fill="#10B981">
      <animate attributeName="r" values="3;7;3" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
